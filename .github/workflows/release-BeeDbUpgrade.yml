name: Release BeeDbUpgrade

on:
  push:
    tags:
      - 'BeeDbUpgrade-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish BeeDbUpgrade
      working-directory: src\BeeDbUpgrade
      run: |
        dotnet publish BeeDbUpgrade.csproj `
          -c Release `
          /p:PublishProfile=FolderProfile

    - name: Create zip package
      run: |
        Compress-Archive `
          -Path "src\BeeDbUpgrade\bin\Release\net10.0-windows\publish\win-x64\*" `
          -DestinationPath "${{ github.ref_name }}.zip"

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: ${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
